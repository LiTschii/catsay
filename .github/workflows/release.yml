name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-unix:
    name: Build Unix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: catsay-linux-amd64.tar.gz
          - goos: linux
            goarch: arm64
            asset_name: catsay-linux-arm64.tar.gz
          - goos: darwin
            goarch: amd64
            asset_name: catsay-darwin-amd64.tar.gz
          - goos: darwin
            goarch: arm64
            asset_name: catsay-darwin-arm64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build (fully static)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w -extldflags '-static'" -trimpath -o catsay .

      - name: Package tarball
        run: tar -czf ${{ matrix.asset_name }} catsay

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          CGO_ENABLED: '0'
        run: go build -ldflags="-s -w" -trimpath -o catsay.exe .

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Write NSIS script
        shell: bash
        run: |
          cat > installer.nsi << 'EOF'
          Unicode True
          Name "catsay"
          OutFile "catsay-setup.exe"
          InstallDir "$LOCALAPPDATA\Programs\catsay"
          InstallDirRegKey HKCU "Software\catsay" "Install_Dir"
          RequestExecutionLevel user
          ShowInstDetails show

          Section "Install"
            SetOutPath "$INSTDIR"
            File "catsay.exe"
            WriteRegStr HKCU "Software\catsay" "Install_Dir" "$INSTDIR"
            ; Add to user PATH
            ReadRegStr $0 HKCU "Environment" "PATH"
            StrCmp $0 "" 0 +2
            StrCpy $0 "$INSTDIR"
            StrCpy $0 "$0;$INSTDIR"
            WriteRegExpandStr HKCU "Environment" "PATH" "$0"
            SendMessage ${HWND_BROADCAST} ${WM_WININICHANGE} 0 "STR:Environment" /TIMEOUT=1000
            WriteUninstaller "$INSTDIR\uninstall.exe"
          SectionEnd

          Section "Uninstall"
            Delete "$INSTDIR\catsay.exe"
            Delete "$INSTDIR\uninstall.exe"
            RMDir "$INSTDIR"
            DeleteRegKey HKCU "Software\catsay"
          SectionEnd
          EOF

      - name: Build NSIS installer
        run: makensis installer.nsi

      - name: Install WiX toolset
        run: choco install wixtoolset --no-progress -y

      - name: Write WiX source
        shell: bash
        run: |
          cat > catsay.wxs << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Package Name="catsay" Version="1.0.0" Manufacturer="LiTLiTschi"
                     UpgradeCode="e1a2b3c4-d5e6-7890-abcd-ef1234567890"
                     Scope="perUser">
              <MajorUpgrade DowngradeErrorMessage="A newer version is already installed." />
              <MediaTemplate EmbedCab="yes" />
              <Feature Id="Main">
                <ComponentGroupRef Id="MainComponents" />
                <ComponentRef Id="PathEnvVar" />
              </Feature>
            </Package>
            <Fragment>
              <Directory Id="TARGETDIR" Name="SourceDir">
                <Directory Id="LocalAppDataFolder">
                  <Directory Id="ProgramsFolder" Name="Programs">
                    <Directory Id="INSTALLFOLDER" Name="catsay" />
                  </Directory>
                </Directory>
              </Directory>
            </Fragment>
            <Fragment>
              <ComponentGroup Id="MainComponents" Directory="INSTALLFOLDER">
                <Component Id="MainExecutable">
                  <File Source="catsay.exe" KeyPath="yes" />
                </Component>
              </ComponentGroup>
              <Component Id="PathEnvVar" Directory="INSTALLFOLDER" Guid="a1b2c3d4-e5f6-7890-abcd-ef0987654321">
                <Environment Id="PATH" Name="PATH" Value="[INSTALLFOLDER]" Permanent="no"
                             Part="last" Action="set" System="no" />
                <RegistryValue Root="HKCU" Key="Software\catsay" Name="installed"
                               Type="integer" Value="1" KeyPath="yes" />
              </Component>
            </Fragment>
          </Wix>
          EOF

      - name: Build MSI
        shell: bash
        run: |
          export PATH="$PATH:/c/Program Files (x86)/WiX Toolset v3.14/bin"
          wix build catsay.wxs -o catsay.msi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            catsay.exe
            catsay-setup.exe
            catsay.msi

  update-homebrew:
    name: Update Homebrew Tap
    needs: build-unix
    runs-on: ubuntu-latest

    steps:
      - name: Compute SHA256 hashes
        id: hashes
        run: |
          VERSION=${GITHUB_REF_NAME}
          BASE="https://github.com/LiTLiTschi/catsay/releases/download/${VERSION}"
          for arch in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64; do
            curl -fsSL "${BASE}/catsay-${arch}.tar.gz" -o "catsay-${arch}.tar.gz"
            hash=$(sha256sum "catsay-${arch}.tar.gz" | awk '{print $1}')
            echo "${arch}=${hash}" >> $GITHUB_OUTPUT
          done
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: LiTLiTschi/homebrew-catsay
          token: ${{ secrets.TAP_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          VERSION=${{ steps.hashes.outputs.version }}
          BASE="https://github.com/LiTLiTschi/catsay/releases/download/v${VERSION}"
          cat > tap/Formula/catsay.rb << EOF
          class Catsay < Formula
            desc "Like cowsay, but it's a cat -- and it reads files directly, like cat"
            homepage "https://github.com/LiTLiTschi/catsay"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE}/catsay-darwin-arm64.tar.gz"
                sha256 "${{ steps.hashes.outputs.darwin-arm64 }}"
              end
              on_intel do
                url "${BASE}/catsay-darwin-amd64.tar.gz"
                sha256 "${{ steps.hashes.outputs.darwin-amd64 }}"
              end
            end

            on_linux do
              on_arm do
                url "${BASE}/catsay-linux-arm64.tar.gz"
                sha256 "${{ steps.hashes.outputs.linux-arm64 }}"
              end
              on_intel do
                url "${BASE}/catsay-linux-amd64.tar.gz"
                sha256 "${{ steps.hashes.outputs.linux-amd64 }}"
              end
            end

            def install
              bin.install "catsay"
            end

            test do
              assert_match "meow", shell_output("#{bin}/catsay -s meow")
            end
          end
          EOF

      - name: Commit and push formula
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/catsay.rb
          git commit -m "catsay ${{ steps.hashes.outputs.version }}"
          git push

  publish-npm:
    name: Publish to npm
    needs: build-unix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout catsay
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Bump version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd npm
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Publish
        run: |
          cd npm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
