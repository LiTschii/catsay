name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: catsay-linux-amd64
            binary: catsay
          - goos: linux
            goarch: arm64
            asset_name: catsay-linux-arm64
            binary: catsay
          - goos: darwin
            goarch: amd64
            asset_name: catsay-darwin-amd64
            binary: catsay
          - goos: darwin
            goarch: arm64
            asset_name: catsay-darwin-arm64
            binary: catsay
          - goos: windows
            goarch: amd64
            asset_name: catsay-windows-amd64.exe
            binary: catsay.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build (fully static)
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w -extldflags '-static'" -trimpath -o ${{ matrix.binary }} .

      - name: Rename for release
        run: mv ${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
